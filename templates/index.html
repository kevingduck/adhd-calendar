<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.2/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.2/main.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #calendar { max-width: 900px; margin: 0 auto; }
        .task-form { margin-bottom: 20px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>ADHD Calendar</h1>
    <div class="task-form">
        {% if follow_up_question %}
            <h2>Follow-up Question:</h2>
            <p>{{ follow_up_question }}</p>
            <form method="POST">
                <input type="text" name="answer" placeholder="Your answer" required>
                <button type="submit">Submit Answer</button>
            </form>
        {% else %}
            <form method="POST">
                <input type="text" name="task" placeholder="Enter your task" required>
                <button type="submit">Add Task</button>
            </form>
        {% endif %}
    </div>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <div id="calendar"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendarEvents = JSON.parse('{{ calendar_events|tojson|safe }}');
            
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: calendarEvents,
                eventClick: function(info) {
                    if (info.event.extendedProps.aiResponse) {
                        alert('AI Response: ' + info.event.extendedProps.aiResponse);
                    }
                },
                slotMinTime: '09:00:00',
                slotMaxTime: '22:00:00'
            });
            calendar.render();
        });
    </script>
</body>
</html>
